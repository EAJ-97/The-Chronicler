<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>__HTML_ESCAPED_TITLE__</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #07080e;
      --panel: #0a0c14;
      --border: rgba(255,255,255,0.08);
      --gold: #c8943a;
      --gold-dim: rgba(200,148,58,0.45);
      --text: #e2d5bb;
      --muted: rgba(226,213,187,0.45);
      --faint: rgba(226,213,187,0.22);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; background: var(--bg); color: var(--text); font-family: 'Crimson Pro', Georgia, serif; }
    .app { display: flex; flex-direction: column; height: 100%; }
    header {
      flex-shrink: 0; padding: 12px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; flex-wrap: wrap; gap: 10px;
      background: linear-gradient(180deg, #0f1219 0%, var(--panel) 100%);
    }
    header h1 {
      margin: 0; font-family: Cinzel, serif; font-size: 11px; letter-spacing: 0.2em;
      color: var(--gold); font-weight: 600;
    }
    header .sub { font-size: 12px; color: var(--muted); margin-left: 8px; max-width: 100%; }
    .tabs {
      display: flex; gap: 4px; padding: 0 12px; border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    .tabs button {
      font-family: Cinzel, serif; font-size: 8px; letter-spacing: 0.15em;
      padding: 10px 14px; border: none; background: transparent; color: var(--muted);
      cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px;
    }
    .tabs button.active { color: var(--gold); border-bottom-color: var(--gold); }
    .main { flex: 1; display: flex; min-height: 0; }
    .sidebar {
      width: 280px; flex-shrink: 0; border-right: 1px solid var(--border);
      overflow-y: auto; padding: 8px 6px; background: var(--panel);
    }
    .content { flex: 1; overflow-y: auto; padding: 20px 24px 40px; }
    .panel-hidden { display: none !important; }
    .tree-row {
      padding: 5px 6px 5px calc(8px + var(--depth, 0) * 14px); border-radius: 3px; cursor: pointer;
      font-size: 14px; line-height: 1.3; border: 1px solid transparent;
    }
    .tree-row:hover { background: rgba(255,255,255,0.04); }
    .tree-row.selected { background: rgba(200,148,58,0.12); border-color: rgba(200,148,58,0.25); }
    .tree-row.folder { font-family: Cinzel, serif; font-size: 11px; letter-spacing: 0.06em; color: rgba(226,213,187,0.92); }
    .tree-row.note { color: var(--text); }
    .empty-state {
      padding: 48px 24px; text-align: center; color: var(--faint); font-size: 15px; line-height: 1.6;
    }
    .detail-title { font-family: Cinzel, serif; font-size: 18px; letter-spacing: 0.08em; color: var(--gold); margin: 0 0 8px; }
    .detail-meta { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-family: Cinzel, serif; font-size: 7px; letter-spacing: 0.08em; margin: 2px 4px 2px 0; border: 1px solid rgba(200,148,58,0.3); color: var(--gold-dim); }
    .md { font-size: 16px; line-height: 1.65; color: var(--text); max-width: 52rem; }
    .md h1,.md h2,.md h3 { font-family: Cinzel, serif; color: var(--gold); font-weight: 600; margin: 1.2em 0 0.5em; }
    .md h1 { font-size: 1.35rem; letter-spacing: 0.06em; }
    .md h2 { font-size: 1.15rem; }
    .md h3 { font-size: 1.05rem; }
    .md p { margin: 0.65em 0; }
    .md a { color: #8bc4e2; }
    .md code { background: rgba(255,255,255,0.06); padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
    .md pre { background: rgba(0,0,0,0.35); padding: 12px; border-radius: 4px; overflow-x: auto; }
    .md ul, .md ol { padding-left: 1.4em; }
    .md blockquote { border-left: 3px solid var(--gold-dim); margin: 1em 0; padding-left: 14px; color: var(--muted); }
    .session-block { margin-bottom: 20px; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
    .session-head { font-family: Cinzel, serif; font-size: 10px; letter-spacing: 0.12em; padding: 10px 14px; background: rgba(200,148,58,0.08); color: var(--gold); }
    .session-body { padding: 12px 14px; font-size: 15px; line-height: 1.55; }
    .j-entry { margin: 8px 0; padding-left: var(--ind, 0); border-left: 2px solid rgba(200,148,58,0.15); padding-left: 10px; margin-left: calc(var(--ind, 0) * 12px); }
    .recap-card { margin-bottom: 14px; padding: 12px 14px; border: 1px solid var(--border); border-radius: 4px; background: rgba(255,255,255,0.02); }
    .recap-meta { font-size: 11px; color: var(--muted); margin-bottom: 8px; font-family: Cinzel, serif; letter-spacing: 0.06em; }
    .err { color: #e07070; padding: 12px; background: rgba(200,80,80,0.1); border-radius: 4px; margin: 12px; font-size: 14px; }
    @media (max-width: 720px) {
      .main { flex-direction: column; }
      .sidebar { width: 100%; max-height: 40vh; border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>
  <script type="text/plain" id="chronicler-embedded-b64">__BASE64_PAYLOAD__</script>
  <div class="app">
    <header>
      <h1>CHRONICLER EXPORT (READ-ONLY)</h1>
      <span class="sub" id="fileLabel">Loading…</span>
    </header>
    <div class="tabs" id="tabs" style="display:none">
      <button type="button" data-tab="notes" class="active">NOTES</button>
      <button type="button" data-tab="journal">JOURNAL</button>
      <button type="button" data-tab="recaps">RECAPS</button>
    </div>
    <div class="main" id="main" style="display:none">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="content" id="content"></main>
    </div>
    <div class="empty-state" id="placeholder">Decoding export…</div>
    <div id="errorHost"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js" crossorigin="anonymous"></script>
  <script>
(function () {
  const EXPORT_VERSION = 1;
  var payload = null;
  var noteById = new Map();
  var tagsByNote = new Map();
  var userById = new Map();
  var selectedId = null;
  var treeRoots = [];

  function $(id) { return document.getElementById(id); }

  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s == null ? '' : String(s);
    return d.innerHTML;
  }

  function renderMarkdown(raw) {
    var text = raw == null ? '' : String(raw);
    if (window.marked && window.DOMPurify) {
      var html = marked.parse(text);
      return DOMPurify.sanitize(html, { USE_PROFILES: { html: true } });
    }
    return '<pre style="white-space:pre-wrap;font:inherit">' + esc(text) + '</pre>';
  }

  function buildTree(notes) {
    var map = {};
    var roots = [];
    notes.forEach(function (n) { map[n.id] = Object.assign({}, n, { children: [] }); });
    notes.forEach(function (n) {
      if (n.parent_id != null && map[n.parent_id]) map[n.parent_id].children.push(map[n.id]);
      else roots.push(map[n.id]);
    });
    function sortNodes(arr) {
      arr.sort(function (a, b) {
        if (!!a.is_folder !== !!b.is_folder) return (b.is_folder ? 1 : 0) - (a.is_folder ? 1 : 0);
        var so = (a.sort_order || 0) - (b.sort_order || 0);
        if (so !== 0) return so;
        return String(a.title || '').localeCompare(String(b.title || ''));
      });
      arr.forEach(function (ch) { sortNodes(ch.children); });
    }
    sortNodes(roots);
    return roots;
  }

  function flattenTree(nodes, depth, out) {
    nodes.forEach(function (n) {
      out.push({ node: n, depth: depth });
      if (n.children && n.children.length) flattenTree(n.children, depth + 1, out);
    });
    return out;
  }

  function noteTitle(id) {
    var n = noteById.get(id);
    return n ? n.title : '(missing note #' + id + ')';
  }

  function sessionLabel(sessionId) {
    var s = (payload.sessions || []).find(function (x) { return x.id === sessionId; });
    if (!s) return 'session #' + sessionId;
    return s.title || ('Session ' + (s.session_number != null ? s.session_number : s.id));
  }

  function renderTree() {
    var host = $('sidebar');
    host.innerHTML = '';
    var rows = flattenTree(treeRoots, 0, []);
    rows.forEach(function (_ref) {
      var n = _ref.node;
      var depth = _ref.depth;
      var div = document.createElement('div');
      div.className = 'tree-row ' + (n.is_folder ? 'folder' : 'note');
      div.style.setProperty('--depth', depth);
      div.textContent = n.title || '(untitled)';
      if (n.id === selectedId) div.classList.add('selected');
      div.addEventListener('click', function () {
        selectedId = n.id;
        renderTree();
        renderNoteDetail(n);
      });
      host.appendChild(div);
    });
  }

  function renderNoteDetail(n) {
    var host = $('content');
    if (!n) {
      host.innerHTML = '<p class="empty-state">Select a note or folder.</p>';
      return;
    }
    var tags = tagsByNote.get(n.id) || [];
    var conns = (payload.connections || []).filter(function (c) {
      return c.source_note_id === n.id || c.target_note_id === n.id;
    });
    var imgs = (payload.note_images || []).filter(function (im) { return im.note_id === n.id; });

    var connHtml = '';
    if (conns.length) {
      connHtml = '<div class="detail-meta"><strong style="color:var(--gold-dim)">Connections</strong><br/>';
      conns.forEach(function (c) {
        var other = c.source_note_id === n.id ? c.target_note_id : c.source_note_id;
        var label = c.label ? ' — ' + esc(c.label) : '';
        connHtml += '· → ' + esc(noteTitle(other)) + label + '<br/>';
      });
      connHtml += '</div>';
    }

    var imgHtml = '';
    if (imgs.length) {
      imgHtml = '<div class="detail-meta"><strong style="color:var(--gold-dim)">Images (filenames only)</strong><br/>';
      imgs.forEach(function (im) {
        imgHtml += esc(im.original_name || im.filename) + '<br/>';
      });
      imgHtml += '</div>';
    }

    var tagHtml = tags.length
      ? '<div style="margin-bottom:12px">' + tags.map(function (t) { return '<span class="tag">#' + esc(t) + '</span>'; }).join('') + '</div>'
      : '';

    var folderHint = n.is_folder
      ? '<p class="detail-meta">Folder — select a child in the tree or browse journal/recaps.</p>'
      : '';

    host.innerHTML =
      '<h2 class="detail-title">' + esc(n.title) + '</h2>' +
      '<div class="detail-meta">' +
      (n.is_folder ? 'Folder' : 'Note') +
      (n.category ? ' · ' + esc(n.category) : '') +
      (n.visibility ? ' · ' + esc(n.visibility) : '') +
      '</div>' +
      tagHtml + folderHint + connHtml + imgHtml +
      (n.is_folder ? '' : '<div class="md">' + renderMarkdown(n.content) + '</div>');
  }

  function username(uid) {
    var u = userById.get(uid);
    return u ? u.username : 'user #' + uid;
  }

  function renderJournal() {
    var host = $('content');
    var sessions = (payload.sessions || []).slice().sort(function (a, b) {
      var na = a.session_number != null ? a.session_number : 9999;
      var nb = b.session_number != null ? b.session_number : 9999;
      if (na !== nb) return na - nb;
      return String(a.created_at || '').localeCompare(String(b.created_at || ''));
    });
    var entriesBySession = new Map();
    (payload.journal_entries || []).forEach(function (e) {
      var sid = e.session_id;
      if (sid == null) return;
      if (!entriesBySession.has(sid)) entriesBySession.set(sid, []);
      entriesBySession.get(sid).push(e);
    });
    entriesBySession.forEach(function (list) {
      list.sort(function (a, b) { return (a.sort_order || 0) - (b.sort_order || 0); });
    });

    if (!sessions.length) {
      host.innerHTML = '<p class="empty-state">No journal sessions in this export.</p>';
      return;
    }

    var html = '';
    sessions.forEach(function (s) {
      var title = s.title || ('Session ' + (s.session_number != null ? s.session_number : s.id));
      var entries = entriesBySession.get(s.id) || [];
      html += '<div class="session-block"><div class="session-head">' + esc(title) + '</div><div class="session-body">';
      if (!entries.length) html += '<span style="color:var(--muted)">No entries.</span>';
      entries.forEach(function (e) {
        var ind = Math.min(8, e.indent_level || 0);
        html +=
          '<div class="j-entry" style="--ind:' + ind + '"><span style="color:var(--gold-dim);font-size:11px">' +
          esc(username(e.user_id)) +
          '</span><div class="md" style="margin-top:4px">' +
          renderMarkdown(e.content) +
          '</div></div>';
      });
      html += '</div></div>';
    });
    host.innerHTML = html;
  }

  function renderRecaps() {
    var host = $('content');
    var recaps = (payload.recaps || []).slice().sort(function (a, b) {
      return String(a.created_at || '').localeCompare(String(b.created_at || ''));
    });
    if (!recaps.length) {
      host.innerHTML = '<p class="empty-state">No recaps in this export.</p>';
      return;
    }
    var html = '';
    recaps.forEach(function (r) {
      var stitle = sessionLabel(r.session_id);
      html +=
        '<div class="recap-card"><div class="recap-meta">' +
        esc(r.tone || 'chronicle') +
        ' · ' +
        esc(username(r.generated_by)) +
        ' · session: ' +
        esc(stitle) +
        (r.is_dm_only ? ' · DM only' : '') +
        '</div><div class="md">' +
        renderMarkdown(r.content) +
        '</div></div>';
    });
    host.innerHTML = html;
  }

  function setTab(name) {
    document.querySelectorAll('.tabs button').forEach(function (b) {
      b.classList.toggle('active', b.dataset.tab === name);
    });
    if (name === 'notes') {
      $('sidebar').classList.remove('panel-hidden');
      renderTree();
      var n = noteById.get(selectedId);
      renderNoteDetail(n || null);
    } else {
      $('sidebar').classList.add('panel-hidden');
      if (name === 'journal') renderJournal();
      else renderRecaps();
    }
  }

  function ingest(data) {
    $('errorHost').innerHTML = '';
    if (data.chronicler_export_version !== EXPORT_VERSION) {
      throw new Error('Unsupported export version (expected ' + EXPORT_VERSION + ')');
    }
    if (!Array.isArray(data.notes) || !data.notes.length) {
      throw new Error('Invalid export: missing notes[]');
    }
    payload = data;
    noteById = new Map(data.notes.map(function (n) { return [n.id, n]; }));
    tagsByNote = new Map();
    (data.note_tags || []).forEach(function (r) {
      if (!tagsByNote.has(r.note_id)) tagsByNote.set(r.note_id, []);
      tagsByNote.get(r.note_id).push(r.tag);
    });
    userById = new Map((data.users_referenced || []).map(function (u) { return [u.id, u]; }));
    treeRoots = buildTree(data.notes);
    selectedId = data.root_note_id || data.notes[0].id;

    var meta =
      (data.exported_at ? 'Exported ' + data.exported_at : '') +
      (data.root_kind ? ' · ' + data.root_kind : '') +
      ' · read-only · offline';
    $('fileLabel').textContent = meta;
    $('placeholder').style.display = 'none';
    $('tabs').style.display = 'flex';
    $('main').style.display = 'flex';
    setTab('notes');
  }

  function showError(msg) {
    $('placeholder').style.display = 'none';
    $('errorHost').innerHTML = '<div class="err">' + esc(msg) + '</div>';
  }

  function initEmbedded() {
    try {
      var el = $('chronicler-embedded-b64');
      if (!el) {
        showError('Missing embedded data.');
        return;
      }
      var b64 = el.textContent.trim();
      var bin = atob(b64);
      var bytes = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      var text = new TextDecoder('utf-8').decode(bytes);
      var data = JSON.parse(text);
      ingest(data);
    } catch (e) {
      showError(e.message || 'Could not read embedded export');
    }
  }

  document.querySelectorAll('.tabs button').forEach(function (b) {
    b.addEventListener('click', function () { setTab(b.dataset.tab); });
  });

  initEmbedded();
})();
  </script>
</body>
</html>
