version: '3.8'

services:
  chronicler:
    build: .
    container_name: dnd-chronicler
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - chronicler_data:/data
    environment:
      - NODE_ENV=production
      - PORT=3001

volumes:
  chronicler_data:
    driver: local
